# .github/workflows/ci.yml
# CI rodado em todo PR aberto ou atualizado contra develop ou main.
# Jobs: lint (ESLint), test (Vitest) e build.

name: ✅ CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: 🧪 Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Testes unitários
        id: vitest
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test > vitest.log 2>&1
          code=$?
          echo "$code" > vitest.exit
          tail -n 160 vitest.log
          exit "$code"

      - name: Publica log do Vitest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-log
          path: |
            vitest.log
            vitest.exit
          retention-days: 3

      - name: Falha quando os testes falharem
        if: always()
        shell: bash
        run: |
          code=$(cat vitest.exit 2>/dev/null || echo 1)
          exit "$code"

  build-check:
    name: 📦 Vite build check
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Build
        run: npm run build
