name: ✅ CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: 🧪 Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Testes unitários
        id: vitest
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test > vitest.log 2>&1
          code=$?
          echo "$code" > vitest.exit
          tail -n 160 vitest.log
          exit "$code"
      - name: Publica log do Vitest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-log
          path: |
            vitest.log
            vitest.exit
          retention-days: 3
      - name: Falha quando os testes falharem
        if: always()
        run: exit "$(cat vitest.exit 2>/dev/null || echo 1)"

  build-check:
    name: 📦 Vite build check
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      VITE_ORG_TENANCY_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  edge-functions:
    name: 🛡️ Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Verifica função APF
        id: deno-check
        continue-on-error: true
        shell: bash
        run: |
          set +e
          deno check --config supabase/functions/deno.json supabase/functions/apf-generate/index.ts > deno-check.log 2>&1
          code=$?
          echo "$code" > deno-check.exit
          tail -n 200 deno-check.log
          exit "$code"
      - name: Publica diagnóstico do Deno
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deno-check-log
          path: |
            deno-check.log
            deno-check.exit
          retention-days: 3
      - name: Falha quando o Deno check falhar
        if: always()
        run: exit "$(cat deno-check.exit 2>/dev/null || echo 1)"

  security-contract:
    name: 🔐 SaaS security contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Valida controles críticos das Fases 0 e 1
        shell: bash
        run: |
          set -euo pipefail
          governance="supabase/migrations/20260630010000_ai_usage_governance.sql"
          rate_limits="supabase/migrations/20260630011000_ai_rate_limits.sql"
          multitenant="supabase/migrations/20260630020000_multitenant_foundation.sql"
          edge="supabase/functions/apf-generate/index.ts"
          org_context="src/contexts/OrganizationContext.tsx"

          test -f "$governance"
          test -f "$rate_limits"
          test -f "$multitenant"
          test -f "$edge"
          test -f "$org_context"

          grep -q "create table if not exists public.ai_usage_events" "$governance"
          grep -q "create or replace function public.reserve_ai_usage" "$governance"
          grep -q "revoke all on function public.reserve_ai_usage" "$governance"
          grep -q "get_service_role_key" "$governance"
          grep -q "create table if not exists public.ai_usage_rate_limits" "$rate_limits"
          grep -q "create trigger trg_ai_usage_rate_limit" "$rate_limits"

          grep -q "create table if not exists public.platform_user_roles" "$multitenant"
          grep -q "add column if not exists org_id" "$multitenant"
          grep -q "create or replace function public.is_platform_admin" "$multitenant"
          grep -q "create or replace function public.get_my_organizations_v2" "$multitenant"
          grep -q "create or replace function public.get_accessible_teams_v2" "$multitenant"
          grep -q "VITE_ORG_TENANCY_ENABLED" "$org_context"

          grep -q "AI_USAGE_ENFORCEMENT_MODE" "$edge"
          grep -q "reserve_ai_usage" "$edge"
          grep -q "finalize_ai_usage" "$edge"
          grep -q "AI_MAX_PROMPT_CHARS" "$edge"

          ! grep -q "signUp" src/pages/Auth.tsx
