# .github/workflows/ci.yml
# CI rodado em todo PR aberto ou atualizado contra develop ou main.
# Jobs: lint (ESLint) e test (Vitest).
# Se qualquer job falhar, o merge é bloqueado (configure branch protection
# em Settings → Branches → Require status checks: ci/lint e ci/test).

name: ✅ CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop   # roda também em push direto para capturar commits do Lovable

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true  # cancela runs antigas do mesmo branch/PR

jobs:
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Testes unitários
        run: npm test

  # ─────────────────────────────────────────────────────────────────────
  build-check:
    name: 📦 Vite build check
    runs-on: ubuntu-latest
    # Variáveis mínimas para o build não quebrar na injetada de env
    env:
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Build
        run: npm run build
