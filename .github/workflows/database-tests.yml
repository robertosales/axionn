name: 🗄️ Database isolation tests

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "scripts/check-supabase-migrations.sh"
      - "scripts/run-tenant-isolation-tests.sh"
      - ".github/workflows/database-tests.yml"
  push:
    branches: [develop]
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "scripts/check-supabase-migrations.sh"
      - "scripts/run-tenant-isolation-tests.sh"
      - ".github/workflows/database-tests.yml"
  workflow_dispatch:

concurrency:
  group: database-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenancy-database:
    name: 🔒 pgTAP tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migration versions and build replay manifest
        env:
          MIGRATION_ORDER_OUTPUT: migration-replay-order.txt
        run: bash scripts/check-supabase-migrations.sh

      - name: Start local database and replay all migrations
        run: supabase db start

      - name: Run tenancy database tests
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: bash scripts/run-tenant-isolation-tests.sh

      - name: Publish migration replay manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-replay-order-${{ github.run_number }}
          path: migration-replay-order.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Stop local database
        if: always()
        run: supabase stop --no-backup
