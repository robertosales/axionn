name: 🗄️ Database isolation tests

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - ".github/workflows/database-tests.yml"
  push:
    branches: [develop]
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - ".github/workflows/database-tests.yml"
  workflow_dispatch:

concurrency:
  group: database-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenancy-database:
    name: 🔒 pgTAP tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database and replay migrations
        run: supabase db start

      - name: Run tenancy database tests
        run: supabase test db supabase/tests/database

      - name: Stop local database
        if: always()
        run: supabase stop --no-backup
