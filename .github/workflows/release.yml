# .github/workflows/release.yml
# Disparado quando uma tag v*.*.* é criada (push ou via GitHub Releases).
# O workflow:
#   1. Extrai a versão da tag
#   2. Atualiza package.json no branch de destino (main ou develop)
#   3. Cria uma GitHub Release com body do CHANGELOG ou commits recentes
#
# Como usar:
#   git tag v1.3.0 && git push origin v1.3.0
#   — ou —
#   GitHub UI: Releases → Draft a new release → Create new tag

name: 🚀 Release automático

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # suporte a pre-releases: v1.3.0-beta.1

permissions:
  contents: write

jobs:
  release:
    name: Bump versão & criar GitHub Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout completo (para poder fazer commit) ────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # histórico completo para o changelog
          ref: develop            # branch que recebe o bump; troque por main se precisar
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Extrai versão sem o "v" prefix ────────────────────────────
      - name: Extrai versão da tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # ex: v1.3.0
          VERSION="${TAG#v}"                 # ex: 1.3.0
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 3. Configura git ─────────────────────────────────────────────
      - name: Configura git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 4. Bump package.json sem criar nova tag (evita loop) ─────────
      - name: Bump package.json
        run: |
          npm version ${{ steps.version.outputs.version }} \
            --no-git-tag-version \
            --allow-same-version
          git add package.json package-lock.json
          git diff --staged --quiet || \
            git commit -m "chore(release): bump versão para ${{ steps.version.outputs.tag }}"
          git push origin develop

      # ── 5. Gera body do changelog ─────────────────────────────────────
      - name: Gera changelog
        id: changelog
        run: |
          # Se existir CHANGELOG.md, extrai a seção da tag atual
          TAG="${{ steps.version.outputs.tag }}"
          if [ -f CHANGELOG.md ]; then
            BODY=$(awk "/^## \\[?${TAG#v}\\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          fi

          # Fallback: lista commits desde a tag anterior
          if [ -z "$BODY" ]; then
            PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sed -n '2p')
            if [ -n "$PREV" ]; then
              BODY=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --no-merges | head -40)
            else
              BODY="Primeiro release 🎉"
            fi
          fi

          # Salva em arquivo para evitar problemas de escape no GITHUB_OUTPUT
          echo "$BODY" > /tmp/release_body.md
          echo "body_file=/tmp/release_body.md" >> "$GITHUB_OUTPUT"

      # ── 6. Cria GitHub Release ────────────────────────────────────────
      - name: Cria GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "Axion ${{ steps.version.outputs.tag }}"
          body_path:  ${{ steps.changelog.outputs.body_file }}
          draft:      false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
