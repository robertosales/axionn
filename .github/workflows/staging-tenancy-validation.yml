name: 🧭 Staging tenancy validation

on:
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: "Apply pending migrations to staging before validation"
        required: true
        default: false
        type: boolean
      confirmation:
        description: "When applying migrations, type APPLY-STAGING"
        required: false
        type: string

concurrency:
  group: staging-tenancy-validation
  cancel-in-progress: false

jobs:
  validate-staging:
    name: Validate staging isolation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
      SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migration versions and build replay manifest
        env:
          MIGRATION_ORDER_OUTPUT: migration-replay-order.txt
        run: bash scripts/check-supabase-migrations.sh

      - name: Validate staging secrets and confirmation
        shell: bash
        run: |
          set -euo pipefail
          : "${SUPABASE_ACCESS_TOKEN:?Missing SUPABASE_ACCESS_TOKEN}"
          : "${SUPABASE_PROJECT_REF:?Missing SUPABASE_STAGING_PROJECT_REF}"
          : "${SUPABASE_DB_PASSWORD:?Missing SUPABASE_STAGING_DB_PASSWORD}"
          : "${SUPABASE_STAGING_DB_URL:?Missing SUPABASE_STAGING_DB_URL}"

          if [[ "${{ inputs.apply_migrations }}" == "true" && "${{ inputs.confirmation }}" != "APPLY-STAGING" ]]; then
            echo "Migration application requires the exact confirmation APPLY-STAGING."
            exit 1
          fi

      - name: Link staging project
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Preview pending migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --dry-run 2>&1 | tee migration-dry-run.log

      - name: Apply pending migrations
        if: ${{ inputs.apply_migrations == true }}
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked 2>&1 | tee migration-apply.log

      - name: Prove tenant isolation against staging
        shell: bash
        run: |
          set -euo pipefail
          supabase test db supabase/tests/database \
            --db-url "$SUPABASE_STAGING_DB_URL" 2>&1 | tee database-isolation.log

      - name: Check pre-enforcement readiness
        shell: bash
        run: |
          set -euo pipefail
          supabase test db supabase/tests/staging/01_pre_enforcement_readiness.test.sql \
            --db-url "$SUPABASE_STAGING_DB_URL" 2>&1 | tee tenancy-readiness.log

      - name: Publish staging validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-tenancy-validation-${{ github.run_number }}
          path: |
            migration-replay-order.txt
            migration-dry-run.log
            migration-apply.log
            database-isolation.log
            tenancy-readiness.log
          if-no-files-found: ignore
          retention-days: 14
